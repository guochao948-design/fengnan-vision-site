<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办清单 · Todo List</title>
<style>
:root {
  --bg: #f5f0e8;
  --paper: #fffdf7;
  --paper-shadow: rgba(139,119,90,0.08);
  --ink: #3a3226;
  --ink-light: #8a7e6e;
  --line: #e8e0d0;
  --accent: #c46b4a;
  --accent-soft: rgba(196,107,74,0.12);
  --green: #7eb89a;
  --green-soft: rgba(126,184,154,0.15);
  --gold: #e8b44a;
  --gold-soft: rgba(232,180,74,0.12);
  --red: #d4726a;
  --red-soft: rgba(212,114,106,0.1);
  --radius: 12px;
  --step-bg: #faf7f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(196,107,74,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(126,184,154,.06) 0%,transparent 50%);
  font-family:'Microsoft YaHei','PingFang SC','Hiragino Sans GB','STHeiti','WenQuanYi Micro Hei',sans-serif;
  color:var(--ink);
  padding:24px 16px 80px;
  -webkit-font-smoothing:antialiased;
}
.container{max-width:660px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOpen{from{opacity:0;max-height:0}to{opacity:1;max-height:800px}}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(-20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-8px)}20%{transform:translateX(8px)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes screenShake{0%,100%{transform:translate(0,0)}10%{transform:translate(-4px,-2px)}20%{transform:translate(4px,2px)}30%{transform:translate(-3px,1px)}40%{transform:translate(3px,-1px)}50%{transform:translate(-2px,2px)}60%{transform:translate(2px,-2px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(196,107,74,.4)}50%{box-shadow:0 0 30px 10px rgba(196,107,74,.3)}}

body.shaking{animation:screenShake .5s ease 3;}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;animation:fadeDown .6s ease;padding:0 4px;}
.clock-display{
  font-family:'Cascadia Code','Consolas','Courier New',monospace;
  font-size:44px;font-weight:700;
  background:linear-gradient(135deg,var(--ink) 0%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:2px;line-height:1;
  font-variant-numeric:tabular-nums;flex-shrink:0;
}
.clock-display .clock-sec{font-size:26px;opacity:.5;}
.header-right{text-align:right;}
.header-date{font-size:14px;color:var(--ink-light);margin-bottom:2px;}
.header-greeting{font-size:15px;color:var(--ink-light);}

.reminder-bar{
  background:var(--paper);border-radius:var(--radius);padding:14px 18px;
  margin-bottom:20px;box-shadow:0 2px 16px var(--paper-shadow);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  animation:fadeUp .5s ease .05s both;
}
.reminder-left{display:flex;align-items:center;gap:10px;flex:1;min-width:200px;}
.reminder-icon{font-size:22px;flex-shrink:0;}
.reminder-info{flex:1;}
.reminder-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.reminder-countdown{font-size:12px;color:var(--ink-light);}
.reminder-countdown .countdown-time{
  font-family:'Cascadia Code','Consolas',monospace;font-weight:700;color:var(--accent);font-size:13px;font-variant-numeric:tabular-nums;
}
.reminder-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}
.status-active{background:var(--green-soft);color:var(--green);}
.status-paused{background:var(--gold-soft);color:var(--gold);}
.status-idle{background:var(--red-soft);color:var(--red);}
.status-meeting{background:rgba(139,119,200,.12);color:#7b6baa;}
.reminder-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.reminder-input{
  width:56px;border:1.5px solid var(--line);border-radius:6px;padding:5px 6px;
  font-size:13px;text-align:center;background:transparent;color:var(--ink);outline:none;
  font-family:'Cascadia Code','Consolas',monospace;
}
.reminder-input:focus{border-color:var(--accent);}
.reminder-unit{font-size:12px;color:var(--ink-light);}
.btn-sm{padding:5px 12px;border-radius:8px;border:1.5px solid var(--line);background:transparent;font-size:12px;color:var(--ink-light);transition:all .2s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-meeting{border-color:rgba(139,119,200,.3);color:#7b6baa;}
.btn-meeting:hover{background:rgba(139,119,200,.08);}
.btn-meeting.active{background:#7b6baa;color:#fff;border-color:#7b6baa;}

.stats-card{
  background:var(--paper);border-radius:var(--radius);padding:22px;
  margin-bottom:20px;box-shadow:0 2px 20px var(--paper-shadow);
  display:flex;align-items:center;gap:22px;animation:fadeUp .5s ease .1s both;
}
.progress-ring-wrap{position:relative;flex-shrink:0;}
.progress-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.progress-pct{font-family:'Georgia','Cambria','SimSun',serif;font-size:22px;font-weight:700;color:var(--accent);}
.progress-sub{font-size:11px;color:var(--ink-light);}
.stats-info{flex:1;}
.stats-title{font-size:15px;font-weight:600;margin-bottom:10px;}
.stats-row{display:flex;gap:14px;flex-wrap:wrap;}
.stat-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink-light);}
.stat-dot{width:8px;height:8px;border-radius:50%;}

.input-card{background:var(--paper);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:0 2px 20px var(--paper-shadow);animation:fadeUp .5s ease .2s both;}
.input-row{display:flex;gap:10px;margin-bottom:10px;}
.input-main{flex:1;border:2px solid var(--line);border-radius:8px;padding:10px 14px;font-size:15px;background:transparent;color:var(--ink);outline:none;transition:border-color .2s;}
.input-main:focus{border-color:var(--accent);}
.input-main::placeholder{color:var(--ink-light);opacity:.5;}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;font-weight:600;transition:all .2s;white-space:nowrap;}
.add-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.options-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.opt-label{font-size:12px;color:var(--ink-light);margin-right:2px;}
.pill{padding:4px 10px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:12px;color:var(--ink-light);transition:all .2s;}
.pill:hover{border-color:var(--accent);color:var(--accent);}
.pill.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600;}
.pill-p{padding:4px 10px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:12px;transition:all .2s;}
.pill-p.active{color:#fff;font-weight:600;}

.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;animation:fadeUp .5s ease .3s both;}
.filter-pill{padding:6px 13px;border-radius:20px;border:none;background:transparent;font-size:13px;color:var(--ink-light);transition:all .2s;}
.filter-pill:hover{background:var(--accent-soft);color:var(--accent);}
.filter-pill.active{background:var(--accent);color:#fff;font-weight:600;}
.filter-spacer{flex:1;}
.toggle-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:12px;color:var(--ink-light);transition:all .2s;}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent);}
.toggle-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

.todo-list{display:flex;flex-direction:column;gap:8px;}
.todo-item{background:var(--paper);border-radius:10px;box-shadow:0 1px 8px var(--paper-shadow);transition:all .25s;overflow:hidden;}
.todo-item:hover{box-shadow:0 4px 20px rgba(139,119,90,.12);transform:translateY(-1px);}
.todo-item.completed{opacity:.5;}
.todo-item.completed .todo-text{text-decoration:line-through;text-decoration-color:var(--ink-light);}
.todo-main{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;}
.todo-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0;}
.check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:2px;}
.check-btn:hover{background:var(--accent-soft);}
.check-btn svg{display:none;}
.todo-item.completed .check-btn svg{display:block;}
.todo-content{flex:1;min-width:0;}
.todo-text{font-size:15px;line-height:1.4;word-break:break-word;}
.todo-text-edit{width:100%;border:none;border-bottom:2px solid var(--accent);background:transparent;font-size:15px;color:var(--ink);padding:2px 0;outline:none;}
.todo-meta{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:11px;color:var(--ink-light);flex-wrap:wrap;}
.p-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sep{opacity:.4;}
.step-count{color:var(--accent);font-weight:600;}
.mini-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:5px;}
.mini-bar{flex:1;height:4px;background:var(--line);border-radius:4px;overflow:hidden;}
.mini-fill{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1),background .3s;}
.mini-label{font-size:11px;color:var(--ink-light);font-weight:600;min-width:30px;text-align:right;}
.todo-actions{display:flex;gap:2px;opacity:0;transition:opacity .2s;flex-shrink:0;}
.todo-item:hover .todo-actions{opacity:1;}
.act-btn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;font-size:15px;color:var(--ink-light);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.act-btn:hover{background:var(--accent-soft);color:var(--accent);}
.act-btn.del:hover{background:var(--red-soft);color:var(--red);}
.act-btn.expand{transition:transform .3s ease;}
.act-btn.expand.open{transform:rotate(180deg);}

.steps-panel{border-top:1px dashed var(--line);padding:12px 14px 14px;background:var(--step-bg);animation:slideOpen .3s ease;}
.steps-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.steps-title{font-size:13px;font-weight:600;}
.steps-pct{font-size:12px;font-weight:600;color:var(--accent);}
.step-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:6px;transition:background .15s;}
.step-item:hover{background:rgba(196,107,74,.04);}
.step-item.done .step-txt{text-decoration:line-through;color:var(--ink-light);}
.step-chk{width:18px;height:18px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.step-box{width:14px;height:14px;border:2px solid var(--line);border-radius:3px;transition:border-color .2s;}
.step-chk:hover .step-box{border-color:var(--green);}
.step-chk svg{display:none;}
.step-item.done .step-chk svg{display:block;}
.step-item.done .step-box{display:none;}
.step-txt{font-size:13px;flex:1;line-height:1.4;}
.step-txt-edit{flex:1;border:none;border-bottom:1.5px solid var(--accent);background:transparent;font-size:13px;color:var(--ink);padding:1px 0;outline:none;}
.step-acts{display:flex;gap:2px;opacity:0;transition:opacity .15s;align-items:center;}
.step-item:hover .step-acts{opacity:1;}
.step-btn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;font-size:12px;color:var(--ink-light);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.step-btn:hover{background:var(--accent-soft);color:var(--accent);}
.step-btn.sdel:hover{background:var(--red-soft);color:var(--red);}
.step-alarm{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--gold-soft);color:var(--gold);font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
.step-alarm:hover{background:var(--gold);color:#fff;}
.add-step-row{display:flex;gap:8px;margin-top:8px;}
.add-step-input{flex:1;border:1.5px dashed var(--line);border-radius:6px;padding:6px 10px;font-size:13px;background:transparent;color:var(--ink);outline:none;transition:border-color .2s;}
.add-step-input:focus{border-color:var(--accent);border-style:solid;}
.add-step-input::placeholder{color:var(--ink-light);opacity:.5;}
.add-step-btn{background:transparent;border:1.5px solid var(--green);color:var(--green);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;}
.add-step-btn:hover{background:var(--green-soft);}

.empty{text-align:center;padding:48px 24px;color:var(--ink-light);animation:fadeUp .5s ease;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.footer-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding:10px 4px;font-size:12px;color:var(--ink-light);}
.clear-btn{border:none;background:transparent;font-size:12px;color:var(--red);cursor:pointer;opacity:.7;transition:opacity .2s;}
.clear-btn:hover{opacity:1;text-decoration:underline;}

.data-toolbar{display:flex;justify-content:center;gap:10px;margin-top:24px;padding-top:20px;border-top:1px dashed var(--line);animation:fadeUp .5s ease .5s both;}
.data-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--line);background:transparent;font-size:12px;color:var(--ink-light);transition:all .2s;display:flex;align-items:center;gap:5px;}
.data-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.data-hint{
  margin-top:8px;text-align:center;font-size:11px;line-height:1.55;color:var(--ink-light);opacity:.78;
}

.reminder-overlay,.alarm-overlay{position:fixed;inset:0;background:rgba(58,50,38,.45);backdrop-filter:blur(6px);z-index:9999;display:none;align-items:center;justify-content:center;}
.reminder-overlay.show,.alarm-overlay.show{display:flex;}
.alarm-overlay{z-index:10000;}
.reminder-popup,.alarm-popup{background:var(--paper);border-radius:16px;padding:36px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:popIn .4s ease;max-width:380px;width:90%;}
.reminder-popup.pulse{animation:popIn .4s ease, pulseGlow 1.5s ease infinite;}
.popup-icon{font-size:56px;margin-bottom:12px;animation:shake .6s ease .4s;}
.alarm-popup .popup-icon{animation:shake .6s ease infinite;}
.popup-title{font-family:'Georgia','Cambria','SimSun',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.popup-text{font-size:14px;color:var(--ink-light);margin-bottom:20px;line-height:1.6;}
.popup-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 32px;font-size:15px;font-weight:600;transition:all .2s;}
.popup-btn:hover{filter:brightness(1.1);}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.2);opacity:0;transition:all .3s ease;z-index:10001;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#importInput{display:none;}

@media(max-width:520px){
  .stats-card{flex-direction:column;text-align:center;}
  .stats-row{justify-content:center;}
  .clock-display{font-size:32px;}
  .clock-display .clock-sec{font-size:18px;}
  .header{flex-direction:column;text-align:center;}
  .header-right{text-align:center;}
  .input-row{flex-direction:column;}
  .todo-actions{opacity:1;}
  .step-acts{opacity:1;}
  .reminder-bar{flex-direction:column;align-items:stretch;}
  .reminder-controls{justify-content:flex-end;}
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="clock-display" id="clock"></div>
    <div class="header-right">
      <div class="header-date" id="dateStr"></div>
      <div class="header-greeting" id="greeting"></div>
    </div>
  </header>

  <div class="reminder-bar">
    <div class="reminder-left">
      <span class="reminder-icon" id="reminderIcon">⏰</span>
      <div class="reminder-info">
        <div class="reminder-label">健康提醒</div>
        <div class="reminder-countdown" id="reminderCountdown">设置间隔后开始计时</div>
      </div>
      <span class="reminder-status status-paused" id="reminderStatus">未启动</span>
    </div>
    <div class="reminder-controls">
      <input type="number" class="reminder-input" id="reminderMinutes" value="60" min="1" max="999">
      <span class="reminder-unit">分钟</span>
      <button class="btn-sm" id="btnToggleReminder" onclick="toggleReminder()">启动</button>
      <button class="btn-sm btn-meeting" id="btnMeeting" onclick="toggleMeeting()">🎥 会议</button>
      <button class="btn-sm" id="btnAudio" onclick="handleAudioBtn()" title="上传自定义提醒音频">🔊 自定义音频</button>
      <input type="file" id="audioUpload" accept="audio/*" onchange="uploadAudio(event)" style="display:none">
    </div>
  </div>

  <div class="stats-card">
    <div class="progress-ring-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="36" fill="none" stroke="var(--line)" stroke-width="4"/>
        <circle id="ringCircle" cx="45" cy="45" r="36" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="226.19" stroke-dashoffset="226.19" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);transform:rotate(-90deg);transform-origin:center;"/>
      </svg>
      <div class="progress-text">
        <span class="progress-pct" id="ringPct">0%</span>
        <span class="progress-sub" id="ringSub">0/0</span>
      </div>
    </div>
    <div class="stats-info">
      <div class="stats-title">总体进度（含子步骤加权）</div>
      <div class="stats-row">
        <div class="stat-item"><span class="stat-dot" style="background:var(--accent)"></span><span id="statActive">待完成 0</span></div>
        <div class="stat-item"><span class="stat-dot" style="background:var(--green)"></span><span id="statDone">已完成 0</span></div>
        <div class="stat-item"><span class="stat-dot" style="background:var(--gold)"></span><span id="statTotal">总计 0</span></div>
      </div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input class="input-main" id="todoInput" placeholder="写下你的待办事项..." onkeydown="if(event.key==='Enter')addTodo()">
      <button class="add-btn" onclick="addTodo()">添加</button>
    </div>
    <div class="options-row">
      <span class="opt-label">优先级</span><div id="priorityBtns"></div>
      <span class="opt-label" style="margin-left:8px">分类</span><div id="categoryBtns"></div>
    </div>
  </div>

  <div class="filter-bar">
    <div id="filterBtns"></div>
    <div class="filter-spacer"></div>
    <button class="toggle-btn active" id="toggleCompleted" onclick="toggleShowCompleted()">隐藏已完成</button>
  </div>

  <div class="todo-list" id="todoList"></div>
  <div class="footer-bar" id="footerBar" style="display:none;"><span id="footerText"></span><button class="clear-btn" onclick="clearCompleted()">清除已完成</button></div>

  <div class="data-toolbar">
    <button class="data-btn" onclick="exportData()"><span>📤</span> 导出数据</button>
    <button class="data-btn" onclick="document.getElementById('importInput').click()"><span>📥</span> 导入数据</button>
    <input type="file" id="importInput" accept=".json" onchange="importData(event)">
  </div>
  <div class="data-hint">导出数据会保存为 .json 备份文件，通常在浏览器默认下载目录；导入时请选择之前导出的备份文件。</div>
</div>

<div class="reminder-overlay" id="reminderOverlay">
  <div class="reminder-popup pulse">
    <div class="popup-icon">💧</div>
    <div class="popup-title">小主小主！</div>
    <div class="popup-text">喝口水，活动一下吧 ☕<br>你已经连续工作了一段时间啦</div>
    <button class="popup-btn" onclick="dismissReminder()">好的，我知道了</button>
  </div>
</div>

<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-popup">

/* ─── Utilities ─── */
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=0.95;u.pitch=1.05;u.volume=1;
  const voices=speechSynthesis.getVoices();
  // 优先选微软晓晓（Edge浏览器自带，最自然）
  const v=voices.find(v=>/xiaoxiao/i.test(v.name))
    ||voices.find(v=>/microsoft.*online/i.test(v.name)&&v.lang.startsWith('zh'))
    ||voices.find(v=>/microsoft/i.test(v.name)&&v.lang.startsWith('zh'))
    ||voices.find(v=>v.lang.startsWith('zh')&&/female/i.test(v.name))
    ||voices.find(v=>v.lang.startsWith('zh'))
    ||null;
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

/* ─── Custom Audio for Health Reminder ─── */
const AUDIO_KEY='todo-custom-audio';
let customAudioData=null; // base64 data URL

function loadCustomAudio(){
  try{const d=localStorage.getItem(AUDIO_KEY);if(d){customAudioData=d;updateAudioBtn();}}catch{}
}
function updateAudioBtn(){
  const btn=document.getElementById('btnAudio');
  if(customAudioData){btn.textContent='🔊 已设音频';btn.classList.add('active');}
  else{btn.textContent='🔊 自定义音频';btn.classList.remove('active');}
}
function uploadAudio(event){
  const file=event.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){showToast('⚠️ 音频文件不能超过5MB');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    customAudioData=e.target.result;
    try{localStorage.setItem(AUDIO_KEY,customAudioData);}catch{showToast('⚠️ 文件太大，无法存储到本地');}
    updateAudioBtn();
    // 试播一下
    const audio=new Audio(customAudioData);audio.volume=0.5;audio.play().catch(()=>{});
    showToast('🔊 自定义音频已设置，提醒时将播放此音频');
  };
  reader.readAsDataURL(file);event.target.value='';
}
function playCustomAudio(){
  if(!customAudioData)return false;
  try{const audio=new Audio(customAudioData);audio.volume=0.8;audio.play();return true;}catch{return false;}
}
function clearCustomAudio(){
  customAudioData=null;localStorage.removeItem(AUDIO_KEY);updateAudioBtn();showToast('已清除自定义音频');
}
loadCustomAudio();

  if(customAudioData){

function playChime(){
  try{const a=new Audio(CHIME_AUDIO);a.volume=0.6;a.play();}catch{}
}

function shakeScreen(){document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),1500);}

/* ─── Clock ─── */
function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').innerHTML=`${h}:${m}<span class="clock-sec">:${s}</span>`;
  document.getElementById('dateStr').textContent=n.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const hr=n.getHours();
  document.getElementById('greeting').textContent=hr<6?'夜深了，注意休息':hr<12?'早上好，元气满满的一天':hr<14?'中午好，记得吃午饭':hr<18?'下午好，继续加油':'晚上好，辛苦了一天';
}
updateClock();setInterval(updateClock,1000);

/* ─── Health Reminder (timestamp-based, runs in background tabs) ─── */
let reminderActive=false,meetingMode=false,isIdle=false;
let idleTimeout=null,reminderTimer=null;
let timerEndTime=0;   // Date.now() when timer should fire
let pausedRemaining=0; // seconds left when paused (idle/meeting)
const IDLE_THRESHOLD=15*60*1000;

function getMins(){return parseInt(document.getElementById('reminderMinutes').value)||60;}

function loadRS(){try{const s=JSON.parse(localStorage.getItem(REMINDER_KEY));if(s)document.getElementById('reminderMinutes').value=s.minutes||60;}catch{}}
function saveRS(){localStorage.setItem(REMINDER_KEY,JSON.stringify({minutes:getMins()}));}
loadRS();

function getRemainingSeconds(){
  if(!reminderActive)return 0;
  if(meetingMode||isIdle)return pausedRemaining;
  const r=Math.ceil((timerEndTime-Date.now())/1000);
  return r>0?r:0;
}

function resetTimerFull(){
  timerEndTime=Date.now()+getMins()*60*1000;
  pausedRemaining=getMins()*60;
}

function toggleReminder(){if(!reminderActive)startReminder();else stopReminder();}
function startReminder(){
  reminderActive=true;meetingMode=false;isIdle=false;
  resetTimerFull();
  saveRS();reqNotif();resetIdleTimer();tickReminder();updateRUI();
  showToast('⏰ 提醒已启动，每 '+getMins()+' 分钟提醒一次');
}
function stopReminder(){reminderActive=false;meetingMode=false;isIdle=false;clearTimeout(reminderTimer);updateRUI();showToast('提醒已停止');}

function tickReminder(){
  if(!reminderActive)return;clearTimeout(reminderTimer);
  if(meetingMode||isIdle){updateRUI();reminderTimer=setTimeout(tickReminder,1000);return;}
  const remaining=getRemainingSeconds();
  if(remaining<=0){fireReminder();return;}
  updateRUI();reminderTimer=setTimeout(tickReminder,1000);
}
function fireReminder(){
  shakeScreen();
  document.getElementById('reminderOverlay').classList.add('show');
  // 优先播放自定义音频，没有则用叮咚+语音
  if(!playCustomAudio()){
    try{const a=new Audio(HEALTH_AUDIO);a.volume=0.8;a.play();}catch{playChime();}
  }
  if(Notification.permission==='granted'){try{new Notification('💧 小主小主！',{body:'喝口水，活动一下吧',tag:'health'});}catch{}}
}
function dismissReminder(){
  document.getElementById('reminderOverlay').classList.remove('show');
  resetTimerFull();tickReminder();
}
function toggleMeeting(){
  if(!reminderActive)return;
  if(!meetingMode){
    // 进入会议：记住剩余时间并暂停
    pausedRemaining=getRemainingSeconds();
    meetingMode=true;
    showToast('🎥 会议模式已开启，提醒暂停');
  }else{
    // 退出会议：从0重新开始计时
    meetingMode=false;
    resetTimerFull();
    showToast('会议结束，重新开始计时');
  }
  updateRUI();
}
function updateRUI(){
  const btn=document.getElementById('btnToggleReminder'),st=document.getElementById('reminderStatus'),cd=document.getElementById('reminderCountdown'),ic=document.getElementById('reminderIcon'),mb=document.getElementById('btnMeeting');
  if(!reminderActive){btn.textContent='启动';btn.classList.remove('active');st.textContent='未启动';st.className='reminder-status status-paused';cd.textContent='设置间隔后开始计时';ic.textContent='⏰';mb.classList.remove('active');return;}
  btn.textContent='停止';btn.classList.add('active');mb.classList.toggle('active',meetingMode);
  const rem=getRemainingSeconds();
  const m=Math.floor(rem/60),s=rem%60,ts=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if(meetingMode){st.textContent='会议中';st.className='reminder-status status-meeting';cd.innerHTML='会议模式 · 暂停中';ic.textContent='🎥';}
  else if(isIdle){st.textContent='已离开';st.className='reminder-status status-idle';cd.innerHTML='检测到离开 · 暂停中';ic.textContent='💤';}
  else{st.textContent='运行中';st.className='reminder-status status-active';cd.innerHTML=`距下次提醒 <span class="countdown-time">${ts}</span>`;ic.textContent='⏰';}
}
function reqNotif(){if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}
function resetIdleTimer(){
  if(!reminderActive)return;clearTimeout(idleTimeout);
  if(isIdle){
    isIdle=false;
    resetTimerFull();
    updateRUI();
  }
  // 只在页面拥有焦点时才检测空闲（副屏没焦点不会误判）
  if(document.hasFocus()){
    idleTimeout=setTimeout(()=>{if(reminderActive&&!meetingMode){
      pausedRemaining=getRemainingSeconds();
      isIdle=true;updateRUI();
    }},IDLE_THRESHOLD);
  }
}
['mousemove','keydown','click','scroll','touchstart'].forEach(e=>document.addEventListener(e,resetIdleTimer,{passive:true}));
document.addEventListener('visibilitychange',()=>{if(!reminderActive)return;updateRUI();});
window.addEventListener('focus',()=>{if(reminderActive)resetIdleTimer();});
window.addEventListener('blur',()=>{clearTimeout(idleTimeout);});

/* ─── Step Alarm System ─── */
let firedAlarms=new Set();
setInterval(()=>{
  const n=new Date(),ns=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  todos.forEach(t=>{(t.steps||[]).forEach(s=>{
    if(s.alarm&&!s.done&&s.alarm===ns&&!firedAlarms.has(s.id)){
      firedAlarms.add(s.id);fireStepAlarm(t,s);
      setTimeout(()=>firedAlarms.delete(s.id),70000);
    }
  });});
},10000);

function fireStepAlarm(todo,step){
  shakeScreen();playChime();
  document.getElementById('alarmText').innerHTML=`任务「${escHtml(todo.text)}」的步骤到时间了：<br><strong>${escHtml(step.text)}</strong><br><br>⏰ 设定时间：${step.alarm}`;
  document.getElementById('alarmOverlay').classList.add('show');
  try{const a=new Audio(ALARM_AUDIO);a.volume=0.8;a.play();}catch{playChime();}
  if(Notification.permission==='granted'){try{new Notification('🔔 步骤提醒',{body:`${todo.text} → ${step.text}`,tag:'alarm-'+step.id});}catch{}}
}
function dismissAlarm(){document.getElementById('alarmOverlay').classList.remove('show');}

function setStepAlarm(todoId,stepId){
  const t=todos.find(x=>x.id===todoId);if(!t)return;
  const s=(t.steps||[]).find(x=>x.id===stepId);if(!s)return;
  const v=prompt('设置闹钟时间（格式 HH:MM，如 14:30）\n请切换到英文输入法 / 半角小写模式，使用英文冒号 :\n留空取消闹钟',s.alarm||'');
  if(v===null)return;
  if(v.trim()===''){delete s.alarm;showToast('已取消闹钟');}
  else{
    const m=v.trim().match(/^(\d{1,2}):(\d{2})$/);
    if(!m||+m[1]>23||+m[2]>59){showToast('⚠️ 格式不对，请用英文半角 HH:MM，例如 14:30');return;}
    s.alarm=String(+m[1]).padStart(2,'0')+':'+m[2];showToast('🔔 闹钟已设置：'+s.alarm);
  }
  render();
}

/* ─── Weighted Progress ─── */
function getTaskProgress(todo){
  const steps=todo.steps||[];
  if(!steps.length)return todo.completed?100:0;
  return Math.round(steps.filter(s=>s.done).length/steps.length*100);
}
function getOverallProgress(){
  if(!todos.length)return{pct:0};
  let sum=0;
  todos.forEach(t=>{
    const steps=t.steps||[];
    if(!steps.length)sum+=t.completed?1:0;
    else sum+=steps.filter(s=>s.done).length/steps.length;
  });
  return{pct:Math.round(sum/todos.length*100)};
}

/* ─── Export / Import ─── */
function exportData(){
  const blob=new Blob([JSON.stringify({version:4,exported_at:new Date().toISOString(),todos},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`待办清单备份_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`;
  a.click();showToast('📤 数据已导出到浏览器下载目录');
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      let imp=Array.isArray(d)?d:d.todos;
      if(!imp||!Array.isArray(imp)){showToast('⚠️ 格式不正确');return;}
      let added=0,updated=0;
      imp.forEach(item=>{const idx=todos.findIndex(t=>t.id===item.id);if(idx>=0){todos[idx]=item;updated++;}else{todos.push(item);added++;}});
      render();showToast(`📥 ${added} 条新增，${updated} 条更新`);
    }catch{showToast('⚠️ 解析失败');}
  };
  r.readAsText(file);ev.target.value='';
}

/* ─── Render ─── */
function render(){saveTodos(todos);renderStats();renderList();renderFooter();}

function renderStats(){
  const total=todos.length,done=todos.filter(t=>t.completed).length,o=getOverallProgress();
  const C=2*Math.PI*36;
  document.getElementById('ringCircle').setAttribute('stroke-dashoffset',C-(o.pct/100)*C);
  document.getElementById('ringPct').textContent=o.pct+'%';
  document.getElementById('ringSub').textContent=done+'/'+total;
  document.getElementById('statActive').textContent='待完成 '+(total-done);
  document.getElementById('statDone').textContent='已完成 '+done;
  document.getElementById('statTotal').textContent='总计 '+total;
}

function getFiltered(){
  let l=todos;
  if(curFilter!=='all')l=l.filter(t=>t.category===curFilter);
  if(!showCompleted)l=l.filter(t=>!t.completed);
  return[...l.filter(t=>!t.completed),...l.filter(t=>t.completed)];
}

function renderList(){
  const list=getFiltered(),el=document.getElementById('todoList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🍃</div><p>${curFilter==='all'?'还没有待办事项，添加一个吧':'该分类下暂无事项'}</p></div>`;return;}
  el.innerHTML=list.map((t,i)=>renderItem(t,i)).join('');
}

function renderItem(t,idx){
  const steps=t.steps||[],pct=getTaskProgress(t),pri=PRIS[t.priority]||PRIS.medium;
  const cat=CATS.find(c=>c.key===t.category)||CATS[4],ds=steps.filter(s=>s.done).length;
  const dt=t.created_at?new Date(t.created_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'';
  const exp=t._expanded,pc=pct===100?'var(--green)':pct>50?'var(--gold)':'var(--accent)';
  let sh='';
  if(exp){
    const sl=steps.map(s=>{
      const ab=s.alarm?`<button class="step-alarm" onclick="setStepAlarm('${t.id}','${s.id}')" title="修改/取消闹钟">🔔 ${s.alarm}</button>`
        :`<button class="step-btn" onclick="setStepAlarm('${t.id}','${s.id}')" title="设置闹钟" style="font-size:13px">🔔</button>`;
      return`<div class="step-item ${s.done?'done':''}">
        <button class="step-chk" onclick="toggleStep('${t.id}','${s.id}')"><div class="step-box"></div><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 3.5" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <span class="step-txt" ondblclick="editStepInline(this,'${t.id}','${s.id}')">${escHtml(s.text)}</span>
        <div class="step-acts">${ab}<button class="step-btn" onclick="editStep('${t.id}','${s.id}')">✎</button><button class="step-btn sdel" onclick="deleteStep('${t.id}','${s.id}')">×</button></div>
      </div>`;
    }).join('');
    sh=`<div class="steps-panel">
      <div class="steps-hdr"><span class="steps-title">📌 操作步骤</span>${steps.length?`<span class="steps-pct">${ds}/${steps.length} · ${pct}%</span>`:''}</div>
      ${sl}
      <div class="add-step-row"><input class="add-step-input" id="si_${t.id}" placeholder="添加操作步骤..." onkeydown="if(event.key==='Enter')addStep('${t.id}')"><button class="add-step-btn" onclick="addStep('${t.id}')">+ 添加</button></div>
    </div>`;
  }
  return`<div class="todo-item ${t.completed?'completed':''}" style="animation-delay:${idx*.04}s">
    <div class="todo-main">
      <div class="todo-left">
        <button class="check-btn" onclick="toggleTodo('${t.id}')" style="border-color:${pri.c}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="${pri.c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="todo-content">
          <span class="todo-text" ondblclick="editTodoInline(this,'${t.id}')">${escHtml(t.text)}</span>
          <div class="todo-meta"><span class="p-dot" style="background:${pri.c}"></span><span>${pri.l}</span><span class="sep">·</span><span>${cat.icon} ${cat.label}</span>${dt?`<span class="sep">·</span><span>${dt}</span>`:''}${steps.length?`<span class="sep">·</span><span class="step-count">${ds}/${steps.length} 步骤</span>`:''}</div>
          ${steps.length?`<div class="mini-bar-wrap"><div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${pc}"></div></div><span class="mini-label">${pct}%</span></div>`:''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="act-btn expand ${exp?'open':''}" onclick="toggleExpand('${t.id}')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="act-btn" onclick="editTodo('${t.id}')">✎</button>
        <button class="act-btn del" onclick="deleteTodo('${t.id}')">×</button>
      </div>
    </div>${sh}</div>`;
}

function renderFooter(){const d=todos.filter(t=>t.completed).length,f=document.getElementById('footerBar');if(d>0){f.style.display='flex';document.getElementById('footerText').textContent=`已完成 ${d} 项`;}else f.style.display='none';}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ─── CRUD ─── */
function addTodo(){const i=document.getElementById('todoInput'),t=i.value.trim();if(!t)return;todos.unshift({id:uid(),text:t,completed:false,priority:curPriority,category:curCategory,created_at:new Date().toISOString(),steps:[]});i.value='';i.focus();render();}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t)t.completed=!t.completed;render();}
function deleteTodo(id){todos=todos.filter(t=>t.id!==id);render();}
function editTodo(id){const t=todos.find(x=>x.id===id);if(!t)return;const v=prompt('编辑任务',t.text);if(v!==null&&v.trim()){t.text=v.trim();render();}}
function editTodoInline(el,id){const t=todos.find(x=>x.id===id);if(!t)return;const inp=document.createElement('input');inp.className='todo-text-edit';inp.value=t.text;el.replaceWith(inp);inp.focus();const sv=()=>{if(inp.value.trim())t.text=inp.value.trim();render();};inp.addEventListener('blur',sv);inp.addEventListener('keydown',e=>{if(e.key==='Enter')sv();if(e.key==='Escape')render();});}
function toggleExpand(id){const t=todos.find(x=>x.id===id);if(t){t._expanded=!t._expanded;render();}}
function clearCompleted(){todos=todos.filter(t=>!t.completed);render();showToast('已清除所有完成项');}

function addStep(tid){const i=document.getElementById('si_'+tid),t=i.value.trim();if(!t)return;const td=todos.find(x=>x.id===tid);if(!td)return;td.steps=td.steps||[];td.steps.push({id:uid(),text:t,done:false});render();setTimeout(()=>{const el=document.getElementById('si_'+tid);if(el)el.focus();},50);}
function toggleStep(tid,sid){const t=todos.find(x=>x.id===tid);if(!t)return;const s=(t.steps||[]).find(x=>x.id===sid);if(s)s.done=!s.done;const st=t.steps||[];if(st.length&&st.every(x=>x.done))t.completed=true;else if(st.length)t.completed=false;render();}
function deleteStep(tid,sid){const t=todos.find(x=>x.id===tid);if(!t)return;t.steps=(t.steps||[]).filter(x=>x.id!==sid);render();}
function editStep(tid,sid){const t=todos.find(x=>x.id===tid);if(!t)return;const s=(t.steps||[]).find(x=>x.id===sid);if(!s)return;const v=prompt('编辑步骤',s.text);if(v!==null&&v.trim()){s.text=v.trim();render();}}
function editStepInline(el,tid,sid){const t=todos.find(x=>x.id===tid);if(!t)return;const s=(t.steps||[]).find(x=>x.id===sid);if(!s)return;const inp=document.createElement('input');inp.className='step-txt-edit';inp.value=s.text;el.replaceWith(inp);inp.focus();const sv=()=>{if(inp.value.trim())s.text=inp.value.trim();render();};inp.addEventListener('blur',sv);inp.addEventListener('keydown',e=>{if(e.key==='Enter')sv();if(e.key==='Escape')render();});}

/* ─── Options UI ─── */
function renderOptions(){
  let ph='';for(const[k,v]of Object.entries(PRIS)){const a=curPriority===k;ph+=`<button class="pill-p ${a?'active':''}" style="${a?`border-color:${v.c};background:${v.c};color:#fff`:`color:var(--ink-light)`}" onclick="setPriority('${k}')">${v.l}</button> `;}
  document.getElementById('priorityBtns').innerHTML=ph;
  let ch='';CATS.slice(1).forEach(c=>{ch+=`<button class="pill ${curCategory===c.key?'active':''}" onclick="setCategory('${c.key}')">${c.icon} ${c.label}</button> `;});document.getElementById('categoryBtns').innerHTML=ch;
  let fh='';CATS.forEach(c=>{fh+=`<button class="filter-pill ${curFilter===c.key?'active':''}" onclick="setFilter('${c.key}')">${c.icon} ${c.label}</button> `;});document.getElementById('filterBtns').innerHTML=fh;
  const tb=document.getElementById('toggleCompleted');tb.textContent=showCompleted?'隐藏已完成':'显示已完成';tb.classList.toggle('active',showCompleted);
}
function setPriority(p){curPriority=p;renderOptions();}
function setCategory(c){curCategory=c;renderOptions();}
function setFilter(f){curFilter=f;renderOptions();render();}
function toggleShowCompleted(){showCompleted=!showCompleted;renderOptions();render();}

renderOptions();render();resetIdleTimer();
</script>
</body>
