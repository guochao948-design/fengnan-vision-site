<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风男视觉</title>
</head>
<body>
<script>
(async () => {
  const source =
    "https://raw.githubusercontent.com/guochao948-design/fengnan-vision-site/4551305f301651dab0e6907fd573c8c8016e1d23/index.html";

  try {
    let html = await fetch(source, { cache: "no-store" }).then(response => {
      if (!response.ok) throw new Error("读取原页面失败");
      return response.text();
    });

    const heroCSS = `
    .hero {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      min-height: calc(100svh - 52px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      text-align: left;
      padding: 84px max(24px, calc((100vw - var(--container)) / 2)) 34px;
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background-color: #fbfcff;
      background-image:
        url("images/hero-glass-visual_20260712.png"),
        radial-gradient(ellipse at 8% 42%, var(--wash-blue), transparent 44%),
        radial-gradient(ellipse at 94% 12%, var(--wash-violet), transparent 42%);
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size: contain, auto, auto;
      background-position: right top, left top, right top;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        #fbfcff 0%,
        rgba(251, 252, 255, .98) 27%,
        rgba(251, 252, 255, .88) 36%,
        rgba(251, 252, 255, .46) 47%,
        rgba(251, 252, 255, .12) 57%,
        transparent 67%
      );
    }

    .hero-content,
    .hero-stats {
      position: relative;
      z-index: 1;
    }
`;

    html = html.replace(
      /\.hero\s*\{[\s\S]*?\}\s*\.hero-visual\s*\{[\s\S]*?\}\s*\.hero-visual img\s*\{[\s\S]*?\}\s*\.hero-visual::after\s*\{[\s\S]*?\}/,
      heroCSS
    );

    html = html.replace(
      /\s*<div class="hero-visual" aria-hidden="true">\s*<img[^>]*>\s*<\/div>/,
      ""
    );

    html = html.replace(
      /\s*\.hero-visual\s*\{[\s\S]*?\}\s*\.hero-visual img\s*\{[\s\S]*?\}\s*\.hero-visual::after\s*\{[\s\S]*?\}/g,
      ""
    );

    html = html.replace(
      /(@media \(max-width: 720px\)\s*\{[\s\S]*?\.hero\s*\{)([\s\S]*?)(\})/,
      `$1
        min-height: auto;
        padding: 78px 16px 58px;
        background-size: auto 58%, auto, auto;
        background-position: right top, left top, right top;
      $3`
    );

    html = html.replace(
      "</style>",
      `
      @media (max-width: 720px) {
        .hero::before {
          background:
            linear-gradient(
              180deg,
              rgba(251, 252, 255, .54) 0%,
              rgba(251, 252, 255, .82) 30%,
              #fbfcff 58%
            ),
            linear-gradient(
              90deg,
              #fbfcff 0%,
              rgba(251, 252, 255, .58) 55%,
              transparent 100%
            );
        }
      }
      </style>`
    );

    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.body.innerHTML =
      '<div style="padding:40px;font-family:sans-serif">页面加载失败：' +
      error.message +
      "</div>";
  }
})();
</script>
</body>
</html>
